services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fdy-tracker-api
    environment:
      APP_NAME: ${APP_NAME:-江苏专职辅导员招聘追踪系统}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/fdy_tracker.db}
      SCRAPER_INTERVAL: ${SCRAPER_INTERVAL:-7200}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30}
      REQUEST_DELAY_MIN: ${REQUEST_DELAY_MIN:-1}
      REQUEST_DELAY_MAX: ${REQUEST_DELAY_MAX:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_ANALYSIS_ENABLED: ${AI_ANALYSIS_ENABLED:-true}
      AI_ANALYSIS_PROVIDER: ${AI_ANALYSIS_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      AI_ANALYSIS_MODEL: ${AI_ANALYSIS_MODEL:-gpt-5.4}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-v1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_SESSION_MAX_AGE_SECONDS: ${ADMIN_SESSION_MAX_AGE_SECONDS:-28800}
      ADMIN_SESSION_SECURE: ${ADMIN_SESSION_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: fdy-tracker-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
