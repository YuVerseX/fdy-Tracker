name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            python -m unittest -v \
              tests.test_api \
              tests.test_admin_api \
              tests.test_admin_task_service \
              tests.test_health_api \
              tests.test_config \
              tests.test_scraper_service \
              tests.test_attachment_service \
              tests.test_duplicate_service \
              tests.test_post_job_service \
              tests.test_scheduler_jobs \
              tests.test_parser \
              tests.test_filter_service 2>&1 | tee backend-tests.log
          else
            python -m unittest discover -s tests -v 2>&1 | tee backend-tests.log
          fi

      - name: Fail on dangerous backend log patterns
        run: python scripts/check_ci_logs.py backend-tests.log --label backend-tests

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  frontend-build:
    needs: frontend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  smoke:
    if: github.event_name != 'pull_request'
    needs:
      - backend-tests
      - frontend-build
    runs-on: ubuntu-latest
    env:
      WEB_PORT: 8080
      ADMIN_USERNAME: smoke-admin
      ADMIN_PASSWORD: smoke-pass
      ADMIN_SESSION_SECRET: smoke-session-secret-0123456789abcdefghijkl
      ADMIN_SESSION_SECURE: "false"
      API_DOCS_ENABLED: "false"
      AI_ANALYSIS_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deployment smoke
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --build
          python scripts/smoke_deployment.py \
            --base-url "http://127.0.0.1:${WEB_PORT}" \
            --admin-username "${ADMIN_USERNAME}" \
            --admin-password "${ADMIN_PASSWORD}"

      - name: Dump compose status
        if: always()
        run: docker compose ps

      - name: Dump compose logs
        if: always()
        run: docker compose logs --no-color | tee compose-smoke.log

      - name: Fail on dangerous compose log patterns
        if: always()
        run: python scripts/check_ci_logs.py compose-smoke.log --label smoke-compose

      - name: Tear down compose
        if: always()
        run: docker compose down -v --remove-orphans

  publish-images:
    if: github.event_name != 'pull_request'
    needs:
      - backend-tests
      - frontend-build
      - smoke
    uses: ./.github/workflows/publish-images.yml
    permissions:
      contents: read
      packages: write
