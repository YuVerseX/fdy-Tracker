name: Publish Docker Images

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image namespace
        id: prep
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-api:${{ steps.prep.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-web:${{ steps.prep.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke GHCR compose deployment
        shell: bash
        env:
          GHCR_NAMESPACE: ${{ steps.prep.outputs.owner_lc }}
          IMAGE_TAG: ${{ steps.prep.outputs.sha_tag }}
          WEB_PORT: 8081
          ADMIN_USERNAME: smoke-admin
          ADMIN_PASSWORD: smoke-pass
          ADMIN_SESSION_SECRET: smoke-session-secret-0123456789abcdefghijkl
          ADMIN_SESSION_SECURE: "false"
          API_DOCS_ENABLED: "false"
          AI_ANALYSIS_ENABLED: "false"
        run: |
          set -euo pipefail
          docker compose -f docker-compose.ghcr.yml up -d
          python scripts/smoke_deployment.py \
            --base-url "http://127.0.0.1:${WEB_PORT}" \
            --admin-username "${ADMIN_USERNAME}" \
            --admin-password "${ADMIN_PASSWORD}"

      - name: Dump GHCR compose logs
        if: always()
        env:
          GHCR_NAMESPACE: ${{ steps.prep.outputs.owner_lc }}
          IMAGE_TAG: ${{ steps.prep.outputs.sha_tag }}
          WEB_PORT: 8081
          ADMIN_USERNAME: smoke-admin
          ADMIN_PASSWORD: smoke-pass
          ADMIN_SESSION_SECRET: smoke-session-secret-0123456789abcdefghijkl
          ADMIN_SESSION_SECURE: "false"
          API_DOCS_ENABLED: "false"
          AI_ANALYSIS_ENABLED: "false"
        run: docker compose -f docker-compose.ghcr.yml logs --no-color | tee ghcr-compose-smoke.log

      - name: Fail on dangerous GHCR compose log patterns
        if: always()
        run: python scripts/check_ci_logs.py ghcr-compose-smoke.log --label ghcr-compose-smoke

      - name: Tear down GHCR compose
        if: always()
        env:
          GHCR_NAMESPACE: ${{ steps.prep.outputs.owner_lc }}
          IMAGE_TAG: ${{ steps.prep.outputs.sha_tag }}
          WEB_PORT: 8081
          ADMIN_USERNAME: smoke-admin
          ADMIN_PASSWORD: smoke-pass
          ADMIN_SESSION_SECRET: smoke-session-secret-0123456789abcdefghijkl
          ADMIN_SESSION_SECURE: "false"
          API_DOCS_ENABLED: "false"
          AI_ANALYSIS_ENABLED: "false"
        run: docker compose -f docker-compose.ghcr.yml down -v --remove-orphans

      - name: Resolve promote target tag
        id: promote
        shell: bash
        run: |
          set -euo pipefail
          ref_type="${{ github.ref_type }}"
          ref_name="${{ github.ref_name }}"
          default_branch="${{ github.event.repository.default_branch }}"
          target_tag=""

          if [[ "${ref_type}" == "tag" ]]; then
            target_tag="${ref_name}"
          elif [[ "${ref_name}" == "${default_branch}" ]]; then
            target_tag="latest"
          fi

          echo "target_tag=${target_tag}" >> "$GITHUB_OUTPUT"

      - name: Promote backend tags after smoke
        if: steps.promote.outputs.target_tag != ''
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-api:${{ steps.promote.outputs.target_tag }}" \
            "ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-api:${{ steps.prep.outputs.sha_tag }}"

      - name: Promote frontend tags after smoke
        if: steps.promote.outputs.target_tag != ''
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-web:${{ steps.promote.outputs.target_tag }}" \
            "ghcr.io/${{ steps.prep.outputs.owner_lc }}/fdy-tracker-web:${{ steps.prep.outputs.sha_tag }}"
